<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>寻找失落的梦境</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1008;font-family:'STSong','SimSun','Songti SC',serif;touch-action:none;user-select:none;-webkit-user-select:none}
#starfield{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0}

/* ======== 开篇叙事 ======== */
#intro-overlay{position:fixed;inset:0;z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 2s}
#intro-overlay.fade-out{opacity:0;pointer-events:none}
#intro-bg{position:absolute;inset:0;background:url(%E5%BA%95%E5%9B%BE.jpg) center/cover no-repeat;z-index:0;opacity:.88}
#intro-card{position:relative;z-index:1;width:clamp(260px,50vw,500px);padding:clamp(30px,6vh,60px) clamp(20px,4vw,50px);background:url(BEIJINTU.png) center/100% 100% no-repeat;display:flex;flex-direction:column;align-items:center;justify-content:center;animation:cardFloat 7s ease-in-out infinite}
@keyframes cardFloat{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-6px) rotate(.25deg)}50%{transform:translateY(3px) rotate(-.2deg)}75%{transform:translateY(-4px) rotate(.35deg)}}
.intro-title{color:rgba(190,145,80,.95);font-size:clamp(24px,4.5vw,40px);letter-spacing:10px;text-shadow:0 0 8px rgba(170,120,50,.5);opacity:0;transition:opacity 2s;margin-bottom:clamp(16px,3vh,36px)}
.intro-title.visible{opacity:1}
.intro-body{max-width:400px;text-align:center;line-height:2.2;color:rgba(170,130,90,0);font-size:clamp(14px,2.2vw,17px);letter-spacing:3px;transition:color .8s}
.intro-body.visible{color:rgba(170,130,90,.9)}
.intro-body .char{opacity:0;transition:opacity .4s;display:inline}
.intro-body .char.show{opacity:1}
.intro-tap{margin-top:clamp(24px,4vh,44px);color:rgba(170,130,90,0);font-size:clamp(12px,1.8vw,15px);letter-spacing:5px;cursor:pointer;text-shadow:0 0 8px rgba(170,120,50,.5);transition:opacity 1.5s,color 1.5s}
.intro-tap.visible{color:rgba(170,130,90,.65);opacity:1;animation:tapPulse 2.5s ease-in-out infinite}
.intro-tap.visible{color:rgba(255,210,120,.6);opacity:1;animation:tapPulse 2.5s ease-in-out infinite}
@keyframes tapPulse{0%,100%{opacity:.4}50%{opacity:.8}}

/* ======== 画卷主页 ======== */
#scroll-home{position:fixed;inset:0;z-index:60;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity 1.5s ease;pointer-events:none}
#scroll-home.active{opacity:1;pointer-events:auto}
#scroll-canvas{position:absolute;top:0;left:0;width:100%;height:100%}
.scroll-hint{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);color:rgba(180,120,40,.9);font-size:18px;font-weight:bold;letter-spacing:4px;z-index:70;pointer-events:none;text-shadow:0 0 12px rgba(180,120,60,.5)}
.scroll-title{position:fixed;top:22px;left:28px;color:rgba(140,75,30,.95);font-size:34px;font-weight:bold;letter-spacing:8px;z-index:70;pointer-events:none;text-shadow:0 0 12px rgba(200,150,80,.6),0 0 28px rgba(180,130,50,.3),0 0 44px rgba(160,110,40,.15);animation:titleFloat 5s ease-in-out infinite}
@keyframes titleFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.scroll-sections{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);display:flex;gap:60px;z-index:70;pointer-events:none}
.scroll-sec{text-align:center;color:rgba(160,100,30,.5);font-size:20px;font-weight:bold;letter-spacing:4px;transition:all .4s;padding:12px 28px;background:rgba(252,248,240,.8);border-radius:30px}
.scroll-sec.active{color:rgba(180,120,40,.95);font-size:28px;background:rgba(255,250,242,.9);text-shadow:0 0 12px rgba(200,150,60,.5)}
.scroll-sec.active{color:rgba(180,120,40,.95);font-size:26px;text-shadow:0 0 16px rgba(180,120,50,.6)}
.scroll-sec-dot{width:8px;height:8px;border-radius:50%;background:rgba(200,160,100,.2);margin:8px auto 0;transition:all .4s}
.scroll-sec.active .scroll-sec-dot{background:rgba(255,210,110,.9);box-shadow:0 0 18px rgba(255,180,60,.8);width:12px;height:12px}

/* ======== 章节 ======== */
.chapter{position:fixed;inset:0;z-index:10;display:none;pointer-events:none}
.chapter.active{display:block;pointer-events:auto}

#ch1-guide{position:fixed;top:50%;left:24px;transform:translateY(-50%);max-width:200px;padding:20px 16px;line-height:2.2;color:rgba(255,215,130,0);font-size:clamp(13px,1.8vw,16px);letter-spacing:3px;writing-mode:vertical-rl;text-orientation:mixed;text-shadow:0 0 10px rgba(255,200,80,.7),0 0 24px rgba(255,180,60,.5);z-index:55;pointer-events:none;transition:color 1.5s;background:linear-gradient(135deg,rgba(30,22,8,.55),rgba(20,15,5,.3) 60%,transparent);border-radius:12px;border-left:1px solid rgba(255,200,80,.12)}
#ch1-guide.visible{color:rgba(255,215,130,.9)}
#ch1-guide .char{opacity:0;transition:opacity .35s;display:inline}
#ch1-guide .char.show{opacity:1}
#ch1-board{position:fixed;left:calc(50% + 60px);top:50%;transform:translate(-50%,-50%);border:2px dashed rgba(150,180,255,.15);border-radius:8px;background:rgba(100,150,255,.02);box-shadow:inset 0 0 40px rgba(100,150,255,.04);z-index:1;pointer-events:none;transition:all .8s;opacity:0}
#ch1-board.visible{opacity:1}
#ch1-board.complete{border-color:rgba(100,200,255,.45);background:rgba(100,200,255,.06);box-shadow:inset 0 0 60px rgba(100,150,255,.15),0 0 80px rgba(80,180,255,.2);animation:boardPulse 3s infinite alternate}
@keyframes boardPulse{from{box-shadow:inset 0 0 60px rgba(100,200,255,.15),0 0 80px rgba(80,180,255,.2)}to{box-shadow:inset 0 0 80px rgba(100,220,255,.25),0 0 120px rgba(100,200,255,.35)}}
.puzzle-piece{position:fixed;cursor:grab;z-index:10;filter:drop-shadow(2px 4px 8px rgba(0,0,0,.5));touch-action:none;opacity:0;transform:scale(.5)}
.puzzle-piece.visible{opacity:1;transform:scale(1);transition:opacity .6s,transform .6s cubic-bezier(.34,1.56,.64,1)}
.puzzle-piece:hover:not(.snapped):not(.dragging){filter:drop-shadow(0 6px 16px rgba(100,180,255,.35)) brightness(1.08);transform:scale(1.02);z-index:20}
.puzzle-piece.dragging{cursor:grabbing;z-index:100;filter:drop-shadow(0 12px 32px rgba(80,160,255,.5)) brightness(1.12);transform:scale(1.04);transition:none}
.puzzle-piece.snapped{cursor:default;z-index:5;filter:drop-shadow(0 0 8px rgba(100,200,255,.4));pointer-events:none;animation:snapGlow 2.5s infinite alternate}
@keyframes snapGlow{from{filter:drop-shadow(0 0 6px rgba(100,200,255,.35)) brightness(1.05)}to{filter:drop-shadow(0 0 16px rgba(120,220,255,.6)) brightness(1.12)}}
.puzzle-piece .piece-inner{width:100%;height:100%;background-repeat:no-repeat}
.puzzle-piece.floating{animation:pieceFloat 4s infinite}
@keyframes pieceFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-6px) scale(1.01)}}

#ch2-bg{position:fixed;inset:0;z-index:1;background-size:cover;background-repeat:no-repeat;background-position:center;opacity:.2;transition:opacity 2s;filter:blur(2px)}
#ch2-bg.awakening{opacity:.55;filter:blur(1px)}
#ch2-bg.awake{opacity:.9;filter:blur(0)}
#ch2-prompt{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:55;color:rgba(255,220,140,.85);font-size:clamp(16px,2.5vw,22px);letter-spacing:4px;text-shadow:0 0 15px rgba(255,200,80,.6);pointer-events:none;text-align:center}
#ch2-guide{position:fixed;top:50%;right:28px;transform:translateY(-50%);max-width:180px;padding:16px 12px;line-height:2.2;color:rgba(255,215,130,0);font-size:clamp(12px,1.6vw,14px);letter-spacing:2px;writing-mode:vertical-rl;text-orientation:mixed;text-shadow:0 0 10px rgba(255,200,80,.7);z-index:55;pointer-events:none;transition:color 1.5s;background:linear-gradient(225deg,rgba(30,22,8,.45),rgba(20,15,5,.25) 60%,transparent);border-radius:12px;border-right:1px solid rgba(255,200,80,.1)}
#ch2-guide.visible{color:rgba(255,215,130,.85)}
#ch2-guide .char{opacity:0;transition:opacity .35s;display:inline}
#ch2-guide .char.show{opacity:1}
.ch2-note-particle{position:fixed;border-radius:50%;pointer-events:none;z-index:100}

#ch3-guide{position:fixed;top:50%;left:24px;transform:translateY(-50%);max-width:200px;padding:20px 16px;line-height:2.2;color:rgba(255,215,130,0);font-size:clamp(13px,1.8vw,16px);letter-spacing:3px;writing-mode:vertical-rl;text-orientation:mixed;text-shadow:0 0 10px rgba(255,200,80,.7),0 0 24px rgba(255,180,60,.5);z-index:55;pointer-events:none;transition:color 1.5s;background:linear-gradient(135deg,rgba(30,22,8,.55),rgba(20,15,5,.3) 60%,transparent);border-radius:12px;border-left:1px solid rgba(255,200,80,.12)}
#ch3-guide.visible{color:rgba(255,215,130,.9)}
#ch3-guide .char{opacity:0;transition:opacity .35s;display:inline}
#ch3-guide .char.show{opacity:1}
#ch3-board{position:fixed;left:calc(50% + 60px);top:50%;transform:translate(-50%,-50%);border:2px dashed rgba(150,180,255,.15);border-radius:8px;background:rgba(100,150,255,.02);box-shadow:inset 0 0 40px rgba(100,150,255,.04);z-index:1;pointer-events:none;transition:all .8s;opacity:0}
#ch3-board.visible{opacity:1}
#ch3-board.complete{border-color:rgba(100,200,255,.45);background:rgba(100,200,255,.06);box-shadow:inset 0 0 60px rgba(100,150,255,.15),0 0 80px rgba(80,180,255,.2);animation:boardPulse 3s infinite alternate}

#cam-window{position:fixed;bottom:20px;right:20px;width:200px;height:150px;z-index:510;border:2px solid rgba(200,160,100,.5);border-radius:12px;overflow:hidden;box-shadow:0 0 24px rgba(180,130,60,.35);opacity:0;transition:opacity .8s;background:#000}
#cam-window.visible{opacity:1}
#cam-window video{width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
#hand-canvas{position:fixed;inset:0;z-index:250;pointer-events:none}
#gesture-indicator{position:fixed;top:20px;right:20px;z-index:510;display:flex;align-items:center;gap:8px;opacity:0;transition:opacity .5s;pointer-events:none}
#gesture-indicator.visible{opacity:1}
.gesture-emoji{font-size:26px}
.gesture-dots{display:flex;gap:3px}.gesture-dot{width:7px;height:7px;border-radius:50%;background:rgba(200,180,140,.35);transition:all .25s}.gesture-dot.active{background:rgba(140,200,240,.9);box-shadow:0 0 8px rgba(140,200,240,.6)}
.gesture-label{color:rgba(200,180,140,.7);font-size:11px;letter-spacing:1.5px}

#win-overlay{position:fixed;inset:0;z-index:200;background:rgba(5,5,18,.7);backdrop-filter:blur(3px);display:none;align-items:center;justify-content:center;flex-direction:column;opacity:0;transition:opacity 2s}
#win-overlay.show{display:flex;opacity:1}
#win-text{max-width:520px;padding:0 30px;text-align:center;line-height:2.2;color:rgba(255,220,140,.95);font-size:clamp(18px,3.5vw,26px);letter-spacing:4px;text-shadow:0 0 12px rgba(255,200,80,.95)}
#win-text .char{opacity:0;transition:opacity .5s;display:inline}
#win-text .char.show{opacity:1}
.win-divider{width:60px;height:1px;background:linear-gradient(90deg,transparent,rgba(255,210,100,.6),transparent);margin:clamp(16px,3vh,30px) 0;opacity:0;transition:opacity 1s .5s}
.win-divider.visible{opacity:1}
.win-sub{color:rgba(255,210,130,.5);font-size:clamp(12px,2vw,15px);letter-spacing:6px;opacity:0;transition:opacity 1.5s}
.win-sub.visible{opacity:1}
.win-btn{background:rgba(40,25,10,.55);border:1px solid rgba(220,180,120,.5);color:rgba(240,210,160,.9);padding:14px 36px;font-size:16px;font-weight:bold;letter-spacing:4px;cursor:pointer;border-radius:26px;backdrop-filter:blur(10px);transition:all .35s;font-family:inherit;margin:16px 8px}
.win-btn:hover{background:rgba(70,45,20,.65);border-color:rgba(255,210,140,.7);box-shadow:0 0 35px rgba(200,150,80,.4);transform:scale(1.04)}
.win-btns{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;margin-top:20px}
.hint-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(255,210,130,.35);font-size:12px;letter-spacing:2px;z-index:55;pointer-events:none;white-space:nowrap;opacity:0;transition:opacity 1s}
.hint-bar.visible{opacity:1}
.particle{position:fixed;border-radius:50%;pointer-events:none;z-index:150}
#white-title{padding:0 50px;max-width:700px;line-height:2;font-size:clamp(18px,3vw,26px)!important;letter-spacing:4px!important;transition:opacity .8s ease}
</style>
</head>
<body>
<canvas id="starfield"></canvas>

<div id="intro-overlay"><div id="intro-bg"></div><div id="intro-card"><div class="intro-title">寻找失落的梦境</div><div class="intro-body"></div><div class="intro-tap">轻触或握拳进入梦境</div></div></div>

<!-- 纯白引导页 -->
<div id="white-intro" style="position:fixed;inset:0;z-index:510;background:#faf8f4;display:none;flex-direction:column;align-items:center;justify-content:center;transition:opacity 2s">
  <div id="white-title" style="color:rgba(180,140,40,.9);font-size:clamp(28px,5vw,44px);font-weight:bold;letter-spacing:8px;text-shadow:0 0 12px rgba(200,150,60,.5);opacity:0;transition:opacity 2s;margin-bottom:50px">你想进入怎样的梦境？</div>
  <div id="white-guide" style="max-width:500px;text-align:center;line-height:2.4;color:rgba(160,120,60,.8);font-size:clamp(14px,2vw,18px);letter-spacing:3px;opacity:0;transition:opacity 1.5s">
    张开手左右滑动 探索画卷<br>

  </div>

</div>

<div id="scroll-home">
  <canvas id="scroll-canvas"></canvas>
    <div class="scroll-title">你想进入怎样的梦境？</div>
  <div class="scroll-hint">← 滑动画卷探索 → 单手握拳进入关卡</div>
  <div class="scroll-sections">
    <div class="scroll-sec" id="sec0"><div>旋转木马</div><div class="scroll-sec-dot"></div></div>
    <div class="scroll-sec" id="sec1"><div>静默音符</div><div class="scroll-sec-dot"></div></div>
    <div class="scroll-sec" id="sec2"><div>孔明之灯</div><div class="scroll-sec-dot"></div></div>
  </div>
  <canvas id="fist-ring" width="80" height="80" style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:310;pointer-events:none;opacity:0;transition:opacity .3s"></canvas>
</div>

<div class="chapter" id="ch1"><div id="ch1-guide"></div><div id="ch1-board"></div></div>
<div class="chapter" id="ch2"><div id="ch2-bg"></div><div id="ch2-prompt"></div><div id="ch2-guide"></div></div>
<div class="chapter" id="ch3"><img src="XX.jpg" style="position:fixed;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;opacity:.4"><div id="ch3-guide"></div><div id="ch3-board"></div></div>

<svg width="0" height="0"><defs id="clip-defs"></defs></svg>

<video id="cam-video" playsinline autoplay style="position:fixed;top:0;left:0;width:1px;height:1px;opacity:0;pointer-events:none;z-index:-1"></video>
<div id="cam-window"><video id="cam-preview" playsinline autoplay muted></video></div>
<canvas id="hand-canvas"></canvas>
<div id="gesture-indicator"><span class="gesture-emoji" id="gesture-emoji">🖐</span><div class="gesture-dots" id="gesture-dots"><div class="gesture-dot"></div><div class="gesture-dot"></div><div class="gesture-dot"></div><div class="gesture-dot"></div><div class="gesture-dot"></div></div><span class="gesture-label" id="gesture-label"></span></div>

<div id="win-overlay"><div id="win-text"></div><div class="win-divider"></div><div class="win-sub"></div><div class="win-btns" id="win-btns"></div></div>
<div class="hint-bar" id="hint-bar"></div>

<script>
// 尝试多个CDN加载MediaPipe
window._mpFailed=false;
(function(){
  const urls=[
    'https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js',
    'https://unpkg.com/@mediapipe/hands@0.4.1675469240/hands.js'
  ];
  let idx=0;
  function tryLoad(){
    if(idx>=urls.length){window._mpFailed=true;console.warn('所有CDN加载失败，手势不可用');return}
    const s=document.createElement('script');
    s.src=urls[idx];
    s.onerror=()=>{idx++;tryLoad()};
    s.onload=()=>{console.log('MediaPipe加载成功:',urls[idx])};
    document.head.appendChild(s);
  }
  tryLoad();
})();
</script>
<script>
// ==================== 星空 ====================
const sC=document.getElementById('starfield'),sx=sC.getContext('2d');
let W,H,stars=[],shs=[];
function rSC(){W=sC.width=innerWidth;H=sC.height=innerHeight}rSC();addEventListener('resize',rSC);
class Star{constructor(){this.reset()}reset(){this.x=Math.random()*W;this.y=Math.random()*H;this.bs=Math.random()*2+.3;this.s=this.bs;this.sy=Math.random()*.15+.02;this.sx=(Math.random()-.5)*.05;this.o=Math.random()*.6+.2;this.ts=Math.random()*.015+.003;this.td=Math.random()>.5?1:-1;this.h=Math.random()>.7?220+Math.random()*40:200+Math.random()*30}u(){this.y-=this.sy;this.x+=this.sx;if(this.y<-10){this.y=H+10;this.x=Math.random()*W}if(this.x<-10)this.x=W+10;if(this.x>W+10)this.x=-10;this.o+=this.ts*this.td;if(this.o>.9){this.o=.9;this.td=-1}if(this.o<.1){this.o=.1;this.td=1}this.s=this.bs+Math.sin(Date.now()*.003+this.x)*.3}d(){sx.fillStyle=`hsla(${this.h},60%,85%,${this.o})`;sx.beginPath();sx.arc(this.x,this.y,Math.max(.2,this.s),0,Math.PI*2);sx.fill();if(this.s>1.2){sx.fillStyle=`hsla(${this.h},50%,80%,${this.o*.1})`;sx.beginPath();sx.arc(this.x,this.y,this.s*2.5,0,Math.PI*2);sx.fill()}}}
class ShootingStar{constructor(){this.reset(true)}reset(f){this.x=Math.random()*W;this.y=Math.random()*H*.4;this.l=Math.random()*60+30;this.sp=Math.random()*6+4;this.a=Math.PI/4+(Math.random()-.5)*.3;this.lf=0;this.ml=Math.random()*40+30;this.ac=f?!1:!0;this.dl=f?Math.random()*300:0}u(){if(!this.ac){this.dl--;if(this.dl<=0)this.ac=!0;return}this.x+=Math.cos(this.a)*this.sp;this.y+=Math.sin(this.a)*this.sp;this.lf++;if(this.lf>this.ml||this.x>W+100||this.y>H+100)this.reset()}d(){if(!this.ac)return;const p=this.lf/this.ml,o=p<.2?p/.2:p>.8?(1-p)/.3:1,tx=this.x-Math.cos(this.a)*this.l,ty=this.y-Math.sin(this.a)*this.l,g=sx.createLinearGradient(tx,ty,this.x,this.y);g.addColorStop(0,'rgba(200,220,255,0)');g.addColorStop(1,`rgba(220,240,255,${o})`);sx.beginPath();sx.moveTo(tx,ty);sx.lineTo(this.x,this.y);sx.strokeStyle=g;sx.lineWidth=2;sx.lineCap='round';sx.stroke()}}
for(let i=0;i<280;i++)stars.push(new Star());
function aS(){sx.fillStyle='rgba(20,12,6,.25)';sx.fillRect(0,0,W,H);stars.forEach(s=>{s.u();s.d()});requestAnimationFrame(aS)}aS();

// ==================== 工具 ====================
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}
function typeText(el,t,d=80){return new Promise(r=>{el.innerHTML='';for(let i=0;i<t.length;i++){const s=document.createElement('span');s.className='char';if(t[i]==='\n')s.innerHTML='<br>';else s.textContent=t[i];el.appendChild(s)}let idx=0;(function n(){if(idx<el.children.length){el.children[idx].classList.add('show');idx++;setTimeout(n,d)}else r()})()})}
function spawnP(x,y,n,cs){for(let i=0;i<n;i++){const el=document.createElement('div');el.className='particle';const s=Math.random()*4+2;el.style.width=s+'px';el.style.height=s+'px';el.style.left=x+'px';el.style.top=y+'px';el.style.background=cs[Math.floor(Math.random()*cs.length)];el.style.boxShadow=`0 0 ${s*2}px ${cs[Math.floor(Math.random()*cs.length)]}`;document.body.appendChild(el);const a=Math.random()*Math.PI*2,sp=2+Math.random()*4;let vx=Math.cos(a)*sp,vy=Math.sin(a)*sp,o=1,lf=0;(function an(){lf++;el.style.left=(parseFloat(el.style.left)+vx)+'px';el.style.top=(parseFloat(el.style.top)+vy)+'px';vy+=.08;vx*=.98;o-=.018;el.style.opacity=o;if(o>0&&lf<80)requestAnimationFrame(an);else el.remove()})()}}
const PCS=['#a8d8ff','#ffd6a8','#ffb8d0','#c8b8ff','#a8ffe8'];

// ==================== 摄像头+手势 ====================
const hC=document.getElementById('hand-canvas'),hx=hC.getContext('2d');
const cW=document.getElementById('cam-window'),cP=document.getElementById('cam-preview'),cV=document.getElementById('cam-video');

async function initCam(){try{const s=await navigator.mediaDevices.getUserMedia({video:{width:640,height:480,facingMode:'user'},audio:false});cV.srcObject=s;cP.srcObject=s;await cV.play();await cP.play();camR=true;cW.classList.add('visible');gI.classList.add('visible');return true}catch(e){camR=false;return false}}
function countF(lm){if(!lm)return 0;const w=lm[0];let px=w.x,py=w.y;for(const i of[5,9,13,17]){px+=lm[i].x;py+=lm[i].y}px/=5;py/=5;let c=0;for(let i=0;i<4;i++){const m=lm[[5,9,13,17][i]],t=lm[[8,12,16,20][i]];if(Math.hypot(t.x-px,t.y-py)>Math.hypot(m.x-px,m.y-py)*1.1)c++}const tt=lm[4],ti=lm[3];if(Math.hypot(tt.x-px,tt.y-py)>Math.hypot(ti.x-px,ti.y-py)*1.05)c++;return c}
function detectFist(lm){if(!lm)return false;const w=lm[0];let px=w.x,py=w.y;for(const i of[5,9,13,17]){px+=lm[i].x;py+=lm[i].y}px/=5;py/=5;let d=0;for(const i of[4,8,12,16,20])d+=Math.hypot(lm[i].x-px,lm[i].y-py);return d/5<0.15}
function getXY(lm){if(!lm)return{x:0,y:0};let cx=0,cy=0;for(const i of[4,8,12,16,20]){cx+=(1-lm[i].x)*innerWidth;cy+=lm[i].y*innerHeight}return{x:cx/5,y:cy/5}}
function onHR(r){if(!r.multiHandLandmarks||r.multiHandLandmarks.length===0){hL=null;h2L=null;eF=0;eF2=0;isFist1=false;isFist2=false;return}hL=r.multiHandLandmarks[0];eF=countF(hL);isFist1=detectFist(hL);hCtr=getXY(hL);if(r.multiHandLandmarks.length>1){h2L=r.multiHandLandmarks[1];eF2=countF(h2L);isFist2=detectFist(h2L);h2Ctr=getXY(h2L)}else{h2L=null;eF2=0;isFist2=false}}
async function initH(){if(typeof Hands==='undefined')throw new Error('MP');hI=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${f}`});hI.setOptions({maxNumHands:2,modelComplexity:1,minDetectionConfidence:.5,minTrackingConfidence:.3});hI.onResults(onHR);sD();return true}

function dHS(){hx.clearRect(0,0,hC.width,hC.height);hC.width=innerWidth;hC.height=innerHeight;const W=innerWidth,H=innerHeight;function dH(lm){if(!lm)return;const conn=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];hx.strokeStyle='rgba(140,210,240,.5)';hx.lineWidth=2;hx.lineCap='round';for(const[a,b]of conn){hx.beginPath();hx.moveTo((1-lm[a].x)*W,lm[a].y*H);hx.lineTo((1-lm[b].x)*W,lm[b].y*H);hx.stroke()}const tC=['#ff9966','#66bbff','#88dd88','#ffdd66','#ff88cc'];for(let i=0;i<5;i++){const idx=[4,8,12,16,20][i],x=(1-lm[idx].x)*W,y=lm[idx].y*H,gl=hx.createRadialGradient(x,y,0,x,y,12);gl.addColorStop(0,tC[i].replace(')','.8)'));gl.addColorStop(.5,tC[i].replace(')','.3)'));gl.addColorStop(1,'transparent');hx.fillStyle=gl;hx.beginPath();hx.arc(x,y,15,0,Math.PI*2);hx.fill()}for(const l of lm){hx.fillStyle='rgba(255,240,200,.7)';hx.beginPath();hx.arc((1-l.x)*W,l.y*H,2.5,0,Math.PI*2);hx.fill()}}dH(hL);dH(h2L)}

function updateScroll(){
  if(gameState!=='scroll')return;
  // 故事弹窗：握拳收下
  if(storyPopup){document.querySelector('.scroll-sections').style.opacity=storyDismissing?storyAlpha:'0';document.querySelector('.scroll-hint').style.opacity=storyDismissing?storyAlpha:'0'}
  if(storyPopup&&!storyDismissing){const af=(isFist1&&!!hL)||(isFist2&&!!h2L);if(af){fistHold++;if(fistHold>20){storyDismissing=true;fistHold=-30}}else{fistHold=Math.max(0,fistHold-3)};return}
  if(!scrollDragging&&hL&&!isFist1&&eF>=1){
    const hx0=hCtr.x,ew=innerWidth*.3;
    if(hx0<ew)scrollTargetX+=(ew-hx0)/ew*6;
    else if(hx0>innerWidth-ew)scrollTargetX-=(hx0-(innerWidth-ew))/ew*6;
  }
  if(!scrollDragging){scrollVel=(scrollTargetX-scrollX)*.12;scrollX+=scrollVel;if(Math.abs(scrollVel)<.05)scrollX=scrollTargetX}
  const maxRange=Math.max(scrollTotalW-innerWidth,innerWidth*.45)+50;
  scrollX=Math.max(-maxRange,Math.min(50,scrollX));
  const sec=getScrollSec();
  for(let i=0;i<3;i++)document.getElementById('sec'+i).classList.toggle('active',i===sec);
  const secNames=['旋转木马','静默音符','孔明之灯'];
  const doneFlags=[ch1Done,ch2Done,ch3Done];
  let hintText=`当前：${secNames[sec]}`;
  if(doneFlags[sec])hintText+=' ✓ 已完成';
  else hintText+=' · 待完成 · 单手握拳进入';
  document.querySelector('.scroll-hint').textContent=hintText;
  // 更新区域标签颜色
  for(let i=0;i<3;i++){const el=document.getElementById('sec'+i);if(doneFlags[i]){el.style.color='rgba(255,200,80,.95)';el.querySelector('.scroll-sec-dot').style.background='rgba(255,200,80,.9)'}else{el.style.color='';el.querySelector('.scroll-sec-dot').style.background=''}}
  // 日记区域手靠近发光检测
  const dr=window._diaryRect;let near=false;
  if(dr){if(hL){const dx=hCtr.x-(dr.left+dr.width/2);const dy=hCtr.y-(dr.top+dr.height/2);if(Math.abs(dx)<dr.width*.7&&Math.abs(dy)<dr.height*.7)near=true}if(h2L&&!near){const dx=h2Ctr.x-(dr.left+dr.width/2);const dy=h2Ctr.y-(dr.top+dr.height/2);if(Math.abs(dx)<dr.width*.7&&Math.abs(dy)<dr.height*.7)near=true}}
  window._diaryNear=near;
  const anyFist=(isFist1&&!!hL)||(isFist2&&!!h2L);
  if(fistNeedRelease&&!anyFist){fistNeedRelease=false;fistHold=0}
  if(anyFist&&!fistNeedRelease){fistHold++;fistRing.style.opacity='1'}else{fistHold=Math.max(0,fistHold-3);if(fistHold<=0)fistRing.style.opacity='0'}
  if(fistHold>=FIST_HOLD){fistHold=0;fistRing.style.opacity='0';enterChapter(sec)}
}

function drawScroll(){
  if(!scrollReady)return;
  scCtx.canvas.width=innerWidth;scCtx.canvas.height=innerHeight;
  const bgG=scCtx.createLinearGradient(0,0,innerWidth,0);bgG.addColorStop(0,'#f0ebe0');bgG.addColorStop(.5,'#faf7f2');bgG.addColorStop(1,'#f0ebe0');
  scCtx.fillStyle=bgG;scCtx.fillRect(0,0,innerWidth,innerHeight);
  const ih=innerHeight,iw=scrollImgEl.width*(ih/scrollImgEl.height);
  scCtx.drawImage(scrollImgEl,scrollX,0,iw,ih);
  if(scrollX>0){const eg=scCtx.createLinearGradient(0,0,scrollX,0);eg.addColorStop(0,'#f0ebe0');eg.addColorStop(1,'rgba(240,235,224,0)');scCtx.fillStyle=eg;scCtx.fillRect(0,0,scrollX,innerHeight)}

  const diaryW=Math.min(innerWidth-diaryX-15,280); // 占满空白处，最大280px
  if(diaryX>0&&diaryX<innerWidth&&diaryW>60){
    const near=window._diaryNear||false;

      scCtx.shadowColor='rgba(255,200,50,.95)';scCtx.shadowBlur=18;

    scCtx.shadowColor='rgba(0,0,0,.5)';scCtx.shadowBlur=40;scCtx.shadowOffsetY=8;

    else{scCtx.fillStyle='#f5f0e8';scCtx.fillRect(cX,cY,cW,cH)}
    scCtx.shadowColor='transparent';scCtx.shadowBlur=0;scCtx.shadowOffsetY=0;

  sC.style.display='none';
  const wi=document.getElementById('white-intro');wi.style.display='flex';
  document.getElementById('white-title').style.opacity='0';
  document.getElementById('white-guide').style.display='none';
  document.getElementById('white-tap').style.display='none';
  document.getElementById('white-title').textContent=WHITE_SCREENS[0];
  setTimeout(()=>{wi.style.opacity='1'},30);
}
let whiteSwitching=false;
function updateWhiteIntro(){
  if(gameState!=='whiteIntro')return;whiteIntroTimer++;
  // 前3屏：淡入→停留→淡出切换
  if(whiteScreenIdx<3){
    if(!whiteSwitching){
      const total=620,fi=100,fo=520;
      if(whiteIntroTimer<fi)document.getElementById('white-title').style.opacity=whiteIntroTimer/fi;
      else if(whiteIntroTimer<fo)document.getElementById('white-title').style.opacity='1';
      else{document.getElementById('white-title').style.opacity=Math.max(0,1-(whiteIntroTimer-fo)/(total-fo))}
      if(whiteIntroTimer>total){whiteSwitching=true;document.getElementById('white-title').style.opacity='0';setTimeout(()=>{whiteScreenIdx++;whiteIntroTimer=0;document.getElementById('white-title').innerHTML=WHITE_SCREENS[whiteScreenIdx];document.getElementById('white-title').style.opacity='0';whiteSwitching=false},400)}
    }
  }
  // 第4屏：只淡入，不淡出
  if(whiteScreenIdx===3){
    document.getElementById('white-guide').style.display='none';
    document.getElementById('white-tap').style.display='block';
    if(whiteIntroTimer<80)document.getElementById('white-title').style.opacity=whiteIntroTimer/80;
    else document.getElementById('white-title').style.opacity='1';
    if(whiteIntroTimer>60)document.getElementById('white-tap').style.opacity=Math.min(1,(whiteIntroTimer-60)/40);
    const af=(isFist1&&!!hL)||(isFist2&&!!h2L);if(af){fistHold++;if(fistHold>20){goToScroll()}}else{fistHold=Math.max(0,fistHold-3)}
  }
}
function goToScroll(){
  const wi=document.getElementById('white-intro');wi.style.opacity='0';
  setTimeout(()=>{wi.style.display='none';gameState='scroll';scrollHome.classList.add('active');fistHold=-60;storyPopup=true;storyAlpha=1;storyDismissing=false},1500);
}
document.getElementById('white-intro').addEventListener('click',()=>{if(whiteScreenIdx===3&&whiteIntroTimer>100)goToScroll()});
io.addEventListener('click',eP);io.addEventListener('touchend',e=>{e.preventDefault();eP()});
</script>
