<script>

const sC=document.getElementById('starfield'),sx=sC.getContext('2d');
let W,H,stars=[],shs=[];
function rSC(){W=sC.width=innerWidth;H=sC.height=innerHeight}rSC();addEventListener('resize',rSC);
class Star{constructor(){this.reset()}reset(){this.x=Math.random()*W;this.y=Math.random()*H;this.bs=Math.random()*2+.3;this.s=this.bs;this.sy=Math.random()*.15+.02;this.sx=(Math.random()-.5)*.05;this.o=Math.random()*.6+.2;this.ts=Math.random()*.015+.003;this.td=Math.random()>.5?1:-1;this.h=Math.random()>.7?220+Math.random()*40:200+Math.random()*30}u(){this.y-=this.sy;this.x+=this.sx;if(this.y<-10){this.y=H+10;this.x=Math.random()*W}if(this.x<-10)this.x=W+10;if(this.x>W+10)this.x=-10;this.o+=this.ts*this.td;if(this.o>.9){this.o=.9;this.td=-1}if(this.o<.1){this.o=.1;this.td=1}this.s=this.bs+Math.sin(Date.now()*.003+this.x)*.3}d(){sx.fillStyle=`hsla(${this.h},60%,85%,${this.o})`;sx.beginPath();sx.arc(this.x,this.y,Math.max(.2,this.s),0,Math.PI*2);sx.fill();if(this.s>1.2){sx.fillStyle=`hsla(${this.h},50%,80%,${this.o*.1})`;sx.beginPath();sx.arc(this.x,this.y,this.s*2.5,0,Math.PI*2);sx.fill()}}}
class ShootingStar{constructor(){this.reset(true)}reset(f){this.x=Math.random()*W;this.y=Math.random()*H*.4;this.l=Math.random()*60+30;this.sp=Math.random()*6+4;this.a=Math.PI/4+(Math.random()-.5)*.3;this.lf=0;this.ml=Math.random()*40+30;this.ac=f?!1:!0;this.dl=f?Math.random()*300:0}u(){if(!this.ac){this.dl--;if(this.dl<=0)this.ac=!0;return}this.x+=Math.cos(this.a)*this.sp;this.y+=Math.sin(this.a)*this.sp;this.lf++;if(this.lf>this.ml||this.x>W+100||this.y>H+100)this.reset()}d(){if(!this.ac)return;const p=this.lf/this.ml,o=p<.2?p/.2:p>.8?(1-p)/.3:1,tx=this.x-Math.cos(this.a)*this.l,ty=this.y-Math.sin(this.a)*this.l,g=sx.createLinearGradient(tx,ty,this.x,this.y);g.addColorStop(0,'rgba(200,220,255,0)');g.addColorStop(1,`rgba(220,240,255,${o})`);sx.beginPath();sx.moveTo(tx,ty);sx.lineTo(this.x,this.y);sx.strokeStyle=g;sx.lineWidth=2;sx.lineCap='round';sx.stroke()}}

function countF(lm){if(!lm)return 0;const w=lm[0];let px=w.x,py=w.y;for(const i of[5,9,13,17]){px+=lm[i].x;py+=lm[i].y}px/=5;py/=5;let c=0;for(let i=0;i<4;i++){const m=lm[[5,9,13,17][i]],t=lm[[8,12,16,20][i]];if(Math.hypot(t.x-px,t.y-py)>Math.hypot(m.x-px,m.y-py)*1.1)c++}const tt=lm[4],ti=lm[3];if(Math.hypot(tt.x-px,tt.y-py)>Math.hypot(ti.x-px,ti.y-py)*1.05)c++;return c}
function detectFist(lm){if(!lm)return false;const w=lm[0];let px=w.x,py=w.y;for(const i of[5,9,13,17]){px+=lm[i].x;py+=lm[i].y}px/=5;py/=5;let d=0;for(const i of[4,8,12,16,20])d+=Math.hypot(lm[i].x-px,lm[i].y-py);return d/5<0.15}

function dHS(){hx.clearRect(0,0,hC.width,hC.height);hC.width=innerWidth;hC.height=innerHeight;const W=innerWidth,H=innerHeight;function dH(lm){if(!lm)return;const conn=[[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[0,9],[9,10],[10,11],[11,12],[0,13],[13,14],[14,15],[15,16],[0,17],[17,18],[18,19],[19,20],[5,9],[9,13],[13,17]];hx.strokeStyle='rgba(140,210,240,.5)';hx.lineWidth=2;hx.lineCap='round';for(const[a,b]of conn){hx.beginPath();hx.moveTo((1-lm[a].x)*W,lm[a].y*H);hx.lineTo((1-lm[b].x)*W,lm[b].y*H);hx.stroke()}const tC=['#ff9966','#66bbff','#88dd88','#ffdd66','#ff88cc'];for(let i=0;i<5;i++){const idx=[4,8,12,16,20][i],x=(1-lm[idx].x)*W,y=lm[idx].y*H,gl=hx.createRadialGradient(x,y,0,x,y,12);gl.addColorStop(0,tC[i].replace(')','.8)'));gl.addColorStop(.5,tC[i].replace(')','.3)'));gl.addColorStop(1,'transparent');hx.fillStyle=gl;hx.beginPath();hx.arc(x,y,15,0,Math.PI*2);hx.fill()}for(const l of lm){hx.fillStyle='rgba(255,240,200,.7)';hx.beginPath();hx.arc((1-l.x)*W,l.y*H,2.5,0,Math.PI*2);hx.fill()}}dH(hL);dH(h2L)}

  if(gameState==='ch2'&&ch2Started){for(const s of ch2St){const vy=s.vb>0?Math.sin(Date.now()*.06)*s.vb:0;hx.save();const gg=hx.createLinearGradient(s.x1,s.y,0,s.x2,s.y,0);gg.addColorStop(0,'rgba(255,220,140,0)');gg.addColorStop(.2,'rgba(255,220,140,.15)');gg.addColorStop(.5,'rgba(255,220,140,.3)');gg.addColorStop(.8,'rgba(255,220,140,.15)');gg.addColorStop(1,'rgba(255,220,140,0)');const bx=hCtr.x,ds=Math.abs(hCtr.y-s.y),pf=Math.max(0,1-ds/100),ba=(bx-(s.x1+s.x2)/2)*pf*.25;const len=s.x2-s.x1,steps=12,t=Date.now()*.001;hx.strokeStyle=gg;hx.lineWidth=7+vy*.7;hx.shadowColor='rgba(255,200,100,.5)';hx.shadowBlur=16;hx.beginPath();const pluck=s.pluckY||0;const baseVib=(1-Math.abs(pf))*.8;for(let i=0;i<=steps;i++){const frac=i/steps;const cx=s.x1+len*frac;const wave1=Math.sin(frac*Math.PI*3+t*2.5+s.idx)*1.5*baseVib;const wave2=Math.sin(frac*Math.PI*5.7+t*1.8+s.idx*.7)*.7*baseVib;const wave3=Math.sin(frac*Math.PI*8+t*3.1+s.idx*1.3)*.3*baseVib;const pullBend=ba*Math.sin(frac*Math.PI);const pluckBend=pluck*Math.sin(frac*Math.PI);const cy=s.y+wave1+wave2+wave3+pullBend+pluckBend+vy*.3*Math.sin(frac*Math.PI);if(i===0)hx.moveTo(cx,cy);else{const px=s.x1+len*(frac-1/steps),py=s.y+Math.sin((frac-1/steps)*Math.PI*3+t*2.5+s.idx)*1.5*baseVib+Math.sin((frac-1/steps)*Math.PI*5.7+t*1.8+s.idx*.7)*.7*baseVib+Math.sin((frac-1/steps)*Math.PI*8+t*3.1+s.idx*1.3)*.3*baseVib+ba*Math.sin((frac-1/steps)*Math.PI)+pluck*Math.sin((frac-1/steps)*Math.PI);const cpx=px+len/steps*.4,cpy=py;hx.bezierCurveTo(cpx,cpy,cx-len/steps*.4,cy,cx,cy)}}hx.stroke();hx.strokeStyle='rgba(255,255,255,.85)';hx.lineWidth=2.6;hx.shadowBlur=6;hx.beginPath();for(let i=0;i<=steps;i++){const frac=i/steps;const cx=s.x1+len*frac;const w1=Math.sin(frac*Math.PI*3+t*2.5+s.idx)*1.2*baseVib;const w2=Math.sin(frac*Math.PI*5.7+t*1.8+s.idx*.7)*.5*baseVib;const w3=Math.sin(frac*Math.PI*8+t*3.1+s.idx*1.3)*.2*baseVib;const pb=ba*Math.sin(frac*Math.PI);const pkb=pluck*Math.sin(frac*Math.PI);const cy=s.y+w1+w2+w3+pb+pkb;if(i===0)hx.moveTo(cx,cy);else hx.lineTo(cx,cy)}hx.stroke();hx.restore()}}

  for(let ri=ch2Rp.length-1;ri>=0;ri--){const rp=ch2Rp[ri];rp.lf++;const p=rp.lf/rp.mL;if(p>1){ch2Rp.splice(ri,1);continue}const al=p<.15?p/.15:p>.7?(1-p)/.3:1,r=rp.mR*p;hx.save();if(rp.dark){const recoil=p>.5?Math.sin((p-.5)/.5*Math.PI)*.6:0,dg=hx.createRadialGradient(rp.x,rp.y,0,rp.x,rp.y,r*2);dg.addColorStop(0,`rgba(255,255,255,${al*.2+recoil*.3})`);dg.addColorStop(.3,`rgba(200,210,240,${al*.12})`);dg.addColorStop(1,'rgba(100,140,200,0)');hx.fillStyle=dg;hx.beginPath();hx.arc(rp.x,rp.y,r*2,0,Math.PI*2);hx.fill()}else{const waves=8,amp=r*.06;hx.beginPath();for(let w=0;w<=waves*2;w++){const a=(w/(waves*2))*Math.PI*2,wr=r+Math.sin(a*waves+rp.phase)*amp,wx=rp.x+Math.cos(a)*wr,wy=rp.y+Math.sin(a)*wr;if(w===0)hx.moveTo(wx,wy);else hx.lineTo(wx,wy)}hx.strokeStyle=`rgba(255,255,255,${al*.45})`;hx.lineWidth=1.8*(1-p*.5);hx.shadowColor='rgba(200,220,255,.3)';hx.shadowBlur=6;hx.stroke();if(r>20){hx.beginPath();for(let w=0;w<=waves*2;w++){const a=(w/(waves*2))*Math.PI*2,wr2=r*.7+Math.sin(a*waves+rp.phase+1)*amp*1.3,wx=rp.x+Math.cos(a)*wr2,wy=rp.y+Math.sin(a)*wr2;if(w===0)hx.moveTo(wx,wy);else hx.lineTo(wx,wy)}hx.strokeStyle=`rgba(200,220,255,${al*.25})`;hx.lineWidth=1.2*(1-p*.4);hx.stroke()}const og=hx.createRadialGradient(rp.x,rp.y,r*.2,rp.x,rp.y,r*1.1);og.addColorStop(0,`rgba(255,255,255,${al*.1})`);og.addColorStop(.5,`rgba(200,220,255,${al*.07})`);og.addColorStop(1,'rgba(100,160,220,0)');hx.fillStyle=og;hx.beginPath();hx.arc(rp.x,rp.y,r*1.1,0,Math.PI*2);hx.fill()}hx.restore()}while(ch2Rp.length>40)ch2Rp.shift();
